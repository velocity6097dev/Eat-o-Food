<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Bistro Track</title>
  
  <script src="../../assets/js/store.js"></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  
  <style>
    /* Swiggy/Zomato Style Order Cards */
    .order-card {
      background: var(--surface-0);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 0 0 16px 0;
      padding: 16px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all var(--transition-base);
    }
    .order-card:hover {
        box-shadow: var(--shadow-md);
        border-color: var(--brand-primary);
    }

    /* Header: Restaurant & Status */
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 12px;
    }
    .order-title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .order-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .order-meta {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .status-badge.tone-success {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .status-badge.tone-warning {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    .status-badge.tone-info {
      background: var(--info-bg);
      color: var(--info-strong);
    }
    .status-badge.tone-muted {
      background: rgba(148, 163, 184, 0.15);
      color: var(--text-muted);
    }
    .status-badge.pulsing {
      animation: pulse-bg 2s infinite;
    }

    @keyframes pulse-bg {
        0% { opacity: 1; }
        50% { opacity: 0.65; }
        100% { opacity: 1; }
    }

    /* Kitchen progress bar */
    .progress-track {
      height: 6px;
      border-radius: 999px;
      background: var(--surface-1);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--gradient-primary);
      transition: width 0.6s ease;
    }
    .order-note {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 10px;
      border-radius: 8px;
    }
    .order-note.tone-warning {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    .order-note.tone-muted {
      background: rgba(148, 163, 184, 0.12);
      color: var(--text-muted);
    }
    
    /* Footer: Total & Actions */
    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }
    .order-total-wrap {
      display: flex;
      flex-direction: column;
    }
    .order-total-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .order-total {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
    }

    .action-buttons {
        display: flex;
        gap: 8px;
    }

    /* Buttons */
    .btn-outline {
      background: transparent;
      color: var(--brand-primary);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .btn-outline:hover {
      border-color: var(--brand-primary);
      background: var(--brand-primary-light);
    }

    /* Active / Past tabs */
    .order-tabs {
      display: flex;
      gap: 20px;
      margin: 4px 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0 2px 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn.active {
      color: var(--brand-primary);
      border-bottom-color: var(--brand-primary);
    }
    .tab-count {
      font-size: 11px;
      background: var(--surface-1);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 1px 7px;
      font-weight: 700;
    }
    .tab-btn.active .tab-count {
      background: var(--brand-primary-light);
      color: var(--brand-primary);
    }

    .tab-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 16px;
    }

    /* Empty State */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 16px;
      gap: 16px;
    }
    .empty-icon {
      width: 80px;
      height: 80px;
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* === Receipt Modal Styles === */
    .receipt-modal .modal-content {
      background: var(--surface-0);
      padding: 0;
      overflow: hidden;
      max-width: 380px;
      text-align: left;
    }
    .receipt-header {
      background: var(--surface-1);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .receipt-header h3 {
      margin: 0;
      font-size: 16px;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
    }
    .receipt-body {
      padding: 20px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .receipt-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .receipt-meta strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .receipt-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 6px;
    }
    .receipt-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 10px;
      color: var(--text-primary);
    }
    .receipt-item-qty {
      color: var(--brand-primary);
      font-weight: 600;
      min-width: 24px;
      display: inline-block;
    }
    .receipt-bill-summary {
      margin-top: 20px;
      border-top: 1px dashed var(--border);
      padding-top: 12px;
    }
    .bill-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .bill-row.total {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }
    .invoice-modal-btn {
      width: 100%;
      justify-content: center;
      padding: 11px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="app-container">
      
      <div id="header-placeholder"></div>
      
      <main class="body">
        <div class="screen-title" style="margin-top: 10px;">
          <span>Your Orders</span>
        </div>

        <div class="order-tabs" id="order-tabs" style="display: none;">
          <button class="tab-btn active" data-tab="active">
            Active <span class="tab-count" id="count-active">0</span>
          </button>
          <button class="tab-btn" data-tab="past">
            Past Orders <span class="tab-count" id="count-past">0</span>
          </button>
        </div>
        
        <div id="orders-container">
            <div style="text-align: center; color: var(--text-muted); padding: 40px;">Fetching live orders...</div>
        </div>

        <div id="empty-state" style="display: none;">
          <i data-lucide="receipt" class="empty-icon"></i>
          <div>
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">No orders yet</div>
            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 24px;">Looks like you haven't placed any orders.</div>
          </div>
          <a href="./menu.html" class="btn-primary" style="max-width: 200px; display: inline-block;">Browse Menu</a>
        </div>
      </main>

      <div id="footer-placeholder"></div>
</div>

<div class="modal-overlay receipt-modal" id="receipt-modal">
    <div class="modal-content">
        <div class="receipt-header">
            <h3>Order Summary</h3>
            <button class="close-btn" id="close-receipt"><i data-lucide="x" style="width:20px; height:20px;"></i></button>
        </div>
        <div class="receipt-body" id="receipt-body-content">
            </div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    
    setTimeout(() => {
        const navBackBtn = document.querySelector('#header-placeholder .nav-back');
        if (navBackBtn) navBackBtn.href = './menu.html';
    }, 500);

    const ordersContainer = document.getElementById('orders-container');
    const emptyState = document.getElementById('empty-state');
    const orderTabs = document.getElementById('order-tabs');
    const countActiveEl = document.getElementById('count-active');
    const countPastEl = document.getElementById('count-past');
    const receiptModal = document.getElementById('receipt-modal');
    const closeReceiptBtn = document.getElementById('close-receipt');
    const receiptBodyContent = document.getElementById('receipt-body-content');

    // Every status the backend can send, mapped to how it should look.
    // `pulse` = still moving, draws the eye. `stage` = position in the
    // kitchen pipeline used to size the progress bar.
    const STATUS_META = {
      pending:    { label: 'Awaiting Payment', icon: 'hourglass',     tone: 'warning', pulse: true  },
      placed:     { label: 'Order Placed',     icon: 'check-circle',  tone: 'info',    pulse: false },
      preparing:  { label: 'Preparing',        icon: 'chef-hat',      tone: 'info',    pulse: true  },
      ready:      { label: 'Ready for Pickup', icon: 'bell',          tone: 'success', pulse: true  },
      completed:  { label: 'Completed',        icon: 'circle-check',  tone: 'success', pulse: false },
      delivered:  { label: 'Delivered',        icon: 'circle-check',  tone: 'success', pulse: false },
      cancelled:  { label: 'Cancelled',        icon: 'x-circle',      tone: 'muted',   pulse: false },
    };
    const KITCHEN_STAGES = ['placed', 'preparing', 'ready', 'completed'];
    const ACTIVE_STATUSES = ['pending', 'placed', 'preparing', 'ready'];

    let allOrders = [];
    let currentTab = 'active';
    let tickInterval = null;

    // --- Smart timing helpers ---
    const getSmartTime = (dateInput) => {
        const date = new Date(dateInput.replace(' ', 'T'));
        const now = new Date();
        const diffSec = Math.floor((now - date) / 1000);
        const diffMin = Math.floor(diffSec / 60);
        const diffHr = Math.floor(diffMin / 60);

        if (diffSec < 45) return 'Just now';
        if (diffMin < 60) return `${diffMin} min ago`;
        if (diffHr < 24 && date.toDateString() === now.toDateString()) return `${diffHr} hr ago`;

        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        if (date.toDateString() === yesterday.toDateString()) {
            return `Yesterday, ${date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
        }
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    };

    const getElapsedLabel = (dateInput) => {
        const date = new Date(dateInput.replace(' ', 'T'));
        const diffMin = Math.max(0, Math.floor((new Date() - date) / 60000));
        if (diffMin < 1) return 'just now';
        if (diffMin < 60) return `${diffMin} min elapsed`;
        const hrs = Math.floor(diffMin / 60);
        const mins = diffMin % 60;
        return `${hrs}h ${mins}m elapsed`;
    };

    // --- Card builder ---
    const buildOrderCard = (order) => {
        const statusKey = (order.status || 'placed').toLowerCase();
        const meta = STATUS_META[statusKey] || STATUS_META.placed;
        const smartTime = getSmartTime(order.created_at);
        const isMidKitchen = KITCHEN_STAGES.includes(statusKey) && statusKey !== 'completed';
        const canViewInvoice = order.payment_status === 'paid';

        const timeLine = isMidKitchen
            ? `Ordered ${smartTime} &middot; ${getElapsedLabel(order.created_at)}`
            : smartTime;

        let progressHtml = '';
        if (statusKey === 'pending') {
            progressHtml = `<div class="order-note tone-warning"><i data-lucide="hourglass" style="width:13px;height:13px;"></i> Waiting for payment confirmation</div>`;
        } else if (statusKey === 'cancelled') {
            progressHtml = `<div class="order-note tone-muted"><i data-lucide="x-circle" style="width:13px;height:13px;"></i> This order was cancelled</div>`;
        } else if (KITCHEN_STAGES.includes(statusKey)) {
            const pct = ((KITCHEN_STAGES.indexOf(statusKey) + 1) / KITCHEN_STAGES.length) * 100;
            progressHtml = `<div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`;
        }

        const paymentLabel = order.payment_method ? `${order.payment_method} &middot; ` : '';

        return `
          <div class="order-card">
            <div class="order-header">
              <div class="order-title-block">
                <div class="order-title">
                    <i data-lucide="utensils" style="width:16px; height:16px; color: var(--brand-primary)"></i> 
                    Table ${order.table_number} &middot; #${order.id}
                </div>
                <div class="order-meta" title="${new Date(order.created_at.replace(' ', 'T')).toLocaleString()}">${timeLine}</div>
              </div>
              <div class="status-badge tone-${meta.tone} ${meta.pulse ? 'pulsing' : ''}">
                <i data-lucide="${meta.icon}" style="width:11px;height:11px;"></i> ${meta.label}
              </div>
            </div>

            ${progressHtml}

            <div class="order-footer">
              <div class="order-total-wrap">
                  <span class="order-total-label">${paymentLabel}Total</span>
                  <span class="order-total">₹${order.total}</span>
              </div>
              <div class="action-buttons">
                  ${canViewInvoice ? `<button class="btn-outline view-invoice-btn" data-id="${order.id}"><i data-lucide="file-text" style="width:12px;height:12px;"></i> Invoice</button>` : ''}
                  <button class="btn-outline view-details-btn" data-id="${order.id}">Details</button>
              </div>
            </div>
          </div>
        `;
    };

    // --- Tab-aware render (no network call — just re-slices allOrders) ---
    const renderList = () => {
        const activeOrders = allOrders.filter(o => ACTIVE_STATUSES.includes((o.status || '').toLowerCase()));
        const pastOrders = allOrders.filter(o => !ACTIVE_STATUSES.includes((o.status || '').toLowerCase()));

        countActiveEl.textContent = activeOrders.length;
        countPastEl.textContent = pastOrders.length;

        const list = currentTab === 'active' ? activeOrders : pastOrders;

        if (list.length === 0) {
            ordersContainer.innerHTML = `<div class="tab-empty">${currentTab === 'active' ? 'No active orders right now.' : 'No past orders yet.'}</div>`;
        } else {
            ordersContainer.innerHTML = list.map(buildOrderCard).join('');
        }
        if (window.lucide) lucide.createIcons();
    };

    // --- Server-side fetch (runs on load and every poll) ---
    const fetchOrders = async () => {
        const tableNumber = window.persistentStore.getItem('tableNumber');

        if (!tableNumber) {
            orderTabs.style.display = 'none';
            ordersContainer.style.display = 'none';
            emptyState.style.display = 'flex';
            if (window.lucide) lucide.createIcons();
            return;
        }

        try {
            const res = await fetch(`/bistro-track-backend/api/orders/list.php?table=${tableNumber}`);
            const data = await res.json();

            if (!data.success || data.orders.length === 0) {
                orderTabs.style.display = 'none';
                ordersContainer.style.display = 'none';
                emptyState.style.display = 'flex';
                if (window.lucide) lucide.createIcons();
                return;
            }

            allOrders = data.orders;
            emptyState.style.display = 'none';
            orderTabs.style.display = 'flex';
            ordersContainer.style.display = 'block';
            renderList();

        } catch (e) {
            console.error(e);
            ordersContainer.innerHTML = `<div style="text-align: center; color: var(--danger-text); padding: 20px;">Failed to fetch live orders.</div>`;
        }
    };

    // --- Tab switching ---
    orderTabs.addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        currentTab = btn.dataset.tab;
        orderTabs.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        renderList();
    });

    // --- Invoice (backend endpoint to be built — opens in a new tab) ---
    const viewInvoice = (orderId) => {
        window.open(`/bistro-track-backend/api/orders/invoice.php?id=${orderId}`, '_blank');
    };

    // --- Detail view (receipt modal) ---
    const showReceipt = async (orderId) => {
        try {
            receiptBodyContent.innerHTML = `<div style="text-align:center; padding: 20px;">Loading details...</div>`;
            receiptModal.classList.add('active');

            const res = await fetch(`/bistro-track-backend/api/orders/get.php?id=${orderId}`);
            const data = await res.json();

            if (!data.success) {
                receiptBodyContent.innerHTML = `<div style="text-align:center; color:red;">Error loading order details</div>`;
                return;
            }

            const order = data.order;
            const dateString = new Date(order.created_at.replace(' ', 'T')).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

            let itemsHtml = '';
            if (order.items && order.items.length > 0) {
                order.items.forEach(item => {
                    const itemTotal = item.price * item.quantity;
                    itemsHtml += `
                        <div class="receipt-item-row">
                            <div>
                                <span class="receipt-item-qty">${item.quantity}x</span>
                                <span>${item.name}</span>
                            </div>
                            <div>₹${itemTotal}</div>
                        </div>
                    `;
                });
            } else {
                itemsHtml = `<div style="color: var(--text-muted); font-size: 12px; font-style: italic;">Detailed items not found.</div>`;
            }

            let discountHtml = '';
            if (parseFloat(order.discount_amount) > 0) {
                discountHtml = `<div class="bill-row" style="color: var(--success-text);"><span>Discount (${order.promo_code})</span><span>−₹${order.discount_amount}</span></div>`;
            }

            const receiptLine = order.receipt_no
                ? `<div>Receipt No.: <strong>${order.receipt_no}</strong></div>`
                : '';

            receiptBodyContent.innerHTML = `
                <div class="receipt-meta">
                    <div>Order ID: <strong>#${order.id}</strong></div>
                    <div>Date: <strong>${dateString}</strong></div>
                    <div>Payment Method: <strong>${order.payment_method}</strong></div>
                    <div>Table Number: <strong>${order.table_number}</strong></div>
                    ${receiptLine}
                </div>
                
                <div class="receipt-section-title">Item Details</div>
                ${itemsHtml}

                <div class="receipt-bill-summary">
                    <div class="bill-row">
                        <span>Subtotal</span>
                        <span>₹${order.subtotal}</span>
                    </div>
                    ${discountHtml}
                    <div class="bill-row">
                        <span>GST (5%)</span>
                        <span>₹${order.gst_amount}</span>
                    </div>
                    <div class="bill-row total">
                        <span>Grand Total</span>
                        <span>₹${order.total}</span>
                    </div>
                </div>

                ${order.payment_status === 'paid' ? `
                <button class="btn-outline invoice-modal-btn" data-id="${order.id}">
                    <i data-lucide="file-text" style="width:14px;height:14px;"></i> View / Download Invoice
                </button>` : ''}
            `;
            if (window.lucide) lucide.createIcons();
        } catch (e) {
            console.error(e);
            receiptBodyContent.innerHTML = `<div style="text-align:center; color:red;">Network Error</div>`;
        }
    };

    // --- Event listeners (delegated — works for cards and the modal) ---
    document.body.addEventListener('click', (e) => {
        const detailsBtn = e.target.closest('.view-details-btn');
        if (detailsBtn) {
            showReceipt(detailsBtn.dataset.id);
            return;
        }
        const invoiceBtn = e.target.closest('.view-invoice-btn, .invoice-modal-btn');
        if (invoiceBtn) {
            viewInvoice(invoiceBtn.dataset.id);
        }
    });

    closeReceiptBtn.addEventListener('click', () => {
        receiptModal.classList.remove('active');
    });

    receiptModal.addEventListener('click', (e) => {
        if (e.target === receiptModal) {
            receiptModal.classList.remove('active');
        }
    });

    // Initial load + live poll for status changes
    fetchOrders();
    setInterval(fetchOrders, 5000);

    // Re-render every 30s on its own so "5 min ago" / elapsed timers stay
    // fresh even between polls, without refetching from the server.
    tickInterval = setInterval(() => {
        if (allOrders.length > 0) renderList();
    }, 30000);
  });
</script>

<script src="../../assets/js/component-loader.js" defer></script>
</body>
</html>
