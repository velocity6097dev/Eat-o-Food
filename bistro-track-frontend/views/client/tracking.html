<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking - Bistro Track</title>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
</head>
<body>

<div class="app-container">
      <header class="nav-bar">
        <a href="./cart.html" class="back"><i data-lucide="chevron-left"></i></a>
        <span class="title">Payment & Status</span>
        <span style="width:50px"></span>
      </header>
      <main class="body">
        
        <!-- Order Confirmation & Tracking View -->
        <div id="tracking-view">
          <div class="screen-title"><span>Client · Order Status</span></div>
          <div class="success-wrap">
            <div class="success-circle"><i data-lucide="check"></i></div>
            <h2 id="success-title">Order confirmed!</h2>
            <p id="success-details-text">Payment done. Your food is being prepared and will arrive at your table.</p>
            <span id="order-details" class="order-id">#ORD-094 · Table -</span>
          </div>

          <div class="tracker">
            <h4>Live order status</h4>
            <div class="track-step">
              <div class="step-line"></div>
              <div class="step-circle done"><i data-lucide="check"></i></div>
              <div class="step-text"><div class="step-label" id="tracker-step-1-label">Order placed and paid</div><div class="step-sub">9:43 PM</div></div>
            </div>
            <div class="track-step">
              <div class="step-line"></div>
              <div class="step-circle active"><i data-lucide="flame"></i></div>
              <div class="step-text"><div class="step-label active">Kitchen is preparing</div><div class="step-sub">Est. 15 min remaining</div></div>
            </div>
            <div class="track-step">
              <div class="step-line"></div>
              <div class="step-circle pending"><i data-lucide="bell"></i></div>
              <div class="step-text"><div class="step-label">Ready to serve</div></div>
            </div>
            <div class="track-step">
              <div class="step-circle pending"><i data-lucide="armchair"></i></div>
              <div class="step-text"><div class="step-label">Served at your table</div></div>
            </div>
          </div>
        </div>

      </main>
      <footer class="bottom-nav">
        <a href="./menu.html" class="bn-item"><i data-lucide="book-open" class="bn-icon"></i><span class="bn-label">Menu</span></a>
        <a href="./cart.html" class="bn-item"><i data-lucide="shopping-cart" class="bn-icon"></i><span class="bn-label">Cart</span></a>
        <div class="bn-item active"><i data-lucide="receipt" class="bn-icon"></i><span class="bn-label">Orders</span></div>
      </footer>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const successTitle = document.getElementById('success-title');
    const successDetailsText = document.getElementById('success-details-text');
    const orderDetailsEl = document.getElementById('order-details');
    const firstTrackerStepLabel = document.getElementById('tracker-step-1-label');

    const renderOrderStatus = () => {
        // Read order details from localStorage
        const orderDetails = JSON.parse(localStorage.getItem('bistroOrderDetails')) || {};
        const tableNumber = orderDetails.table || localStorage.getItem('userTableNumber') || '-';

        if (orderDetails.method === 'Cash') {
            successTitle.textContent = 'Order Placed!';
            successDetailsText.textContent = `Your order is confirmed. Please pay with cash when your food is served at Table ${tableNumber}.`;
            if (firstTrackerStepLabel) firstTrackerStepLabel.textContent = 'Order placed';
        } else { // UPI success
            successTitle.textContent = 'Order Confirmed!';
            successDetailsText.textContent = `Payment successful. Your food is being prepared and will arrive at Table ${tableNumber}.`;
            if (firstTrackerStepLabel) firstTrackerStepLabel.textContent = 'Order placed and paid';
        }

        if (orderDetailsEl) {
            // In a real app, order ID would be generated by the backend
            orderDetailsEl.textContent = `#ORD-095 · Table ${tableNumber}`;
        }

        // Clear cart after viewing order status to prevent re-ordering
        localStorage.removeItem('bistroCart');
        localStorage.removeItem('bistroPromoApplied');

        if (window.lucide) lucide.createIcons();
    };

    renderOrderStatus();
  });
</script>
</body>
</html>
