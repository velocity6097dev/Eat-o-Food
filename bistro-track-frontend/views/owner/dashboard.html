<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard — Bistro Track</title>

  <script src="../../assets/js/store.js"></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/components.css">

  <style>
    /* Synced Owner Specific Overrides */
    .app-container { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; overflow: hidden; }
    
    .owner-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; background: var(--surface-1); border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 8px; }
    .nav-brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--gradient-primary);
      display: flex; align-items: center; justify-content: center; color: var(--text-on-brand);
    }
    
    .owner-body { flex: 1; overflow-y: auto; padding: 16px; }
    
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .metric-card {
      background: var(--glass-bg); backdrop-filter: var(--glass-backdrop);
      border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px;
    }
    .metric-icon { color: var(--brand-primary); margin-bottom: 8px; }
    .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .metric-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }

    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .sec-head h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }

    .ui-card {
      background: var(--glass-bg); backdrop-filter: var(--glass-backdrop);
      border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; margin-bottom: 12px;
    }

    /* Bottom Nav */
    .owner-nav-bar {
      display: flex; background: var(--surface-1); border-top: 1px solid var(--border);
    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 0; color: var(--text-muted); font-size: 11px; text-decoration: none;
    }
    .bn-item.active { color: var(--brand-primary); }
  </style>
</head>
<body>

<div class="app-container">
  
  <nav class="owner-nav">
    <div class="nav-brand">
      <div class="nav-brand-icon"><i data-lucide="chef-hat" style="width: 20px;"></i></div>
      <div>
        <div style="font-weight: 700; font-size: 14px;">Bistro Track</div>
        <div style="font-size: 11px; color: var(--text-muted);">Owner Panel</div>
      </div>
    </div>
    <div style="display: flex; gap: 12px;">
      <i data-lucide="bell" style="color: var(--text-secondary);"></i>
    </div>
  </nav>

  <main class="owner-body">
    
    <div class="metrics-grid">
      <div class="metric-card">
        <i data-lucide="receipt" class="metric-icon"></i>
        <div class="metric-label">Total Orders</div>
        <div class="metric-value" id="metric-orders">0</div>
      </div>
      <div class="metric-card">
        <i data-lucide="indian-rupee" class="metric-icon"></i>
        <div class="metric-label">Revenue</div>
        <div class="metric-value" id="metric-revenue">₹0</div>
      </div>
    </div>

    <div class="sec-head">
      <h3><i data-lucide="clipboard-list" style="width: 18px; color: var(--brand-primary);"></i> Live Orders</h3>
    </div>
    
    <div id="active-orders-container">
      </div>

  </main>

  <nav class="owner-nav-bar">
    <a class="bn-item active" href="./dashboard.html">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </a>
    <a class="bn-item" href="./menu-manager.html">
      <i data-lucide="book-open"></i><span>Menu</span>
    </a>
    <a class="bn-item" href="./settings.html">
      <i data-lucide="settings"></i><span>Settings</span>
    </a>
  </nav>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const ordersContainer = document.getElementById('active-orders-container');
    const metricOrders = document.getElementById('metric-orders');
    const metricRevenue = document.getElementById('metric-revenue');

    const renderDashboard = () => {
      // Pull actual orders from the client's store
      const history = window.persistentStore.getItem('orderHistory') || [];
      
      metricOrders.textContent = history.length;
      const totalRev = history.reduce((sum, order) => sum + order.total, 0);
      metricRevenue.textContent = `₹${totalRev}`;

      if (history.length === 0) {
        ordersContainer.innerHTML = `
          <div class="ui-card" style="text-align:center; padding: 32px 16px;">
            <i data-lucide="inbox" style="width: 48px; height: 48px; color: var(--text-muted); opacity: 0.5; margin-bottom: 12px;"></i>
            <div style="color: var(--text-secondary); font-size: 14px;">No orders yet today.</div>
          </div>`;
        if (window.lucide) lucide.createIcons();
        return;
      }

      let ordersHtml = '';
      
      // Reverse to show newest orders at the top
      [...history].reverse().forEach((order) => {
        let itemsSummary = '';
        if (order.items && Object.keys(order.items).length > 0) {
            itemsSummary = Object.values(order.items)
                .map(item => `<span style="color: var(--brand-primary); font-weight: 600;">${item.quantity}x</span> ${item.name}`)
                .join('<br>');
        }

        const dateOptions = { hour: '2-digit', minute: '2-digit' };
        const timeString = new Date(order.timestamp).toLocaleTimeString('en-US', dateOptions);

        ordersHtml += `
          <div class="ui-card" style="display: flex; flex-direction: column; gap: 12px;">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border); padding-bottom: 8px;">
              <div style="font-weight: 700; font-size: 15px;">Table ${order.table}</div>
              <div style="font-size: 12px; color: var(--text-muted);">${timeString}</div>
            </div>
            
            <div style="font-size: 13px; color: var(--text-primary); line-height: 1.6;">
              ${itemsSummary}
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--border); padding-top: 12px;">
               <div style="font-weight: 700; color: var(--text-primary);">₹${order.total}</div>
               <div style="font-size: 11px; padding: 4px 8px; background: var(--success-bg); color: var(--success-text); border-radius: 6px; font-weight: 600;">Paid via ${order.method}</div>
            </div>
          </div>`;
      });

      ordersContainer.innerHTML = ordersHtml;
      if (window.lucide) lucide.createIcons();
    };

    renderDashboard();
    
    // Auto-refresh the dashboard every 10 seconds to check for new client orders
    setInterval(renderDashboard, 10000); 
  });
</script>
</body>
</html>
