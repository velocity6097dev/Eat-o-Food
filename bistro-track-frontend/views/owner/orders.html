<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders — Bistro Track Owner</title>
  <script src="../../assets/js/store.js"></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <style>
    body { background: var(--app-bg); color: var(--text-primary); font-family: sans-serif; padding: 20px; }
    .order-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .header { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px dashed var(--border); padding-bottom: 12px; }
    .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    .btn-ready { background: var(--warning-bg); color: var(--warning-text); }
    .btn-complete { background: var(--success-bg); color: var(--success-text); }
  </style>
</head>
<body>
  <h2>Live Kitchen Orders</h2>
  <div id="owner-orders-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('owner-orders-container');

      function renderOrders() {
        const history = window.persistentStore.getItem('orderHistory') || [];
        if (history.length === 0) {
          container.innerHTML = "<p>No active orders.</p>";
          return;
        }

        let html = '';
        // Show newest first
        [...history].reverse().forEach((order, index) => {
          // Calculate the original index in the un-reversed array for updating
          const originalIndex = history.length - 1 - index;
          const status = order.status || 'Preparing';
          
          let itemsHtml = '';
          if (order.items) {
             itemsHtml = Object.values(order.items).map(i => `${i.quantity}x ${i.name}`).join('<br>');
          }

          html += `
            <div class="order-card">
              <div class="header">
                <strong>Table ${order.table}</strong>
                <span>Status: ${status}</span>
              </div>
              <p>${itemsHtml}</p>
              <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button class="btn btn-ready" onclick="updateStatus(${originalIndex}, 'Ready to Serve')">Mark Ready</button>
                <button class="btn btn-complete" onclick="updateStatus(${originalIndex}, 'Completed')">Mark Completed</button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      window.updateStatus = function(index, newStatus) {
        const history = window.persistentStore.getItem('orderHistory') || [];
        if(history[index]) {
          history[index].status = newStatus;
          window.persistentStore.setItem('orderHistory', history);
          renderOrders(); // Re-render the UI
        }
      };

      renderOrders();
      setInterval(renderOrders, 5000); // Poll for new client orders every 5 seconds
    });
  </script>
</body>
</html>
